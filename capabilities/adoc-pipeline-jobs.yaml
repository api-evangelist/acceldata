naftiko: 1.0.0-alpha2
info:
  label: Acceldata - Data Observability Cloud API — Pipeline Jobs
  description: 'Acceldata - Data Observability Cloud API — Pipeline Jobs. 1 operations. Lead operation: Acceldata List Pipeline
    Jobs. Self-contained Naftiko capability covering one Acceldata business surface.'
  tags:
  - Acceldata
  - Pipeline Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACCELDATA_API_KEY: ACCELDATA_API_KEY
capability:
  consumes:
  - type: http
    namespace: adoc-pipeline-jobs
    baseUri: https://api.acceldata.app/v1
    description: Acceldata - Data Observability Cloud API — Pipeline Jobs business capability. Self-contained, no shared references.
    resources:
    - name: pipeline-jobs
      path: /pipeline-jobs
      operations:
      - name: listpipelinejobs
        method: GET
        description: Acceldata List Pipeline Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by pipeline job status.
        - name: from_time
          in: query
          type: string
          description: Start time for job query range.
        - name: page
          in: query
          type: integer
          description: Page number.
        - name: limit
          in: query
          type: integer
          description: Results per page.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ACCELDATA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: adoc-pipeline-jobs-rest
    port: 8080
    description: REST adapter for Acceldata - Data Observability Cloud API — Pipeline Jobs. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/pipeline-jobs
      name: pipeline-jobs
      description: REST surface for pipeline-jobs.
      operations:
      - method: GET
        name: listpipelinejobs
        description: Acceldata List Pipeline Jobs
        call: adoc-pipeline-jobs.listpipelinejobs
        with:
          status: rest.status
          from_time: rest.from_time
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adoc-pipeline-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Acceldata - Data Observability Cloud API — Pipeline Jobs. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: acceldata-list-pipeline-jobs
      description: Acceldata List Pipeline Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adoc-pipeline-jobs.listpipelinejobs
      with:
        status: tools.status
        from_time: tools.from_time
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
