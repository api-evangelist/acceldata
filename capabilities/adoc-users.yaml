naftiko: 1.0.0-alpha2
info:
  label: Acceldata - Data Observability Cloud API — Users
  description: 'Acceldata - Data Observability Cloud API — Users. 1 operations. Lead operation: Acceldata List Users. Self-contained
    Naftiko capability covering one Acceldata business surface.'
  tags:
  - Acceldata
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACCELDATA_API_KEY: ACCELDATA_API_KEY
capability:
  consumes:
  - type: http
    namespace: adoc-users
    baseUri: https://api.acceldata.app/v1
    description: Acceldata - Data Observability Cloud API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: Acceldata List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number.
        - name: limit
          in: query
          type: integer
          description: Results per page.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ACCELDATA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: adoc-users-rest
    port: 8080
    description: REST adapter for Acceldata - Data Observability Cloud API — Users. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: Acceldata List Users
        call: adoc-users.listusers
        with:
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adoc-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Acceldata - Data Observability Cloud API — Users. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: acceldata-list-users
      description: Acceldata List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adoc-users.listusers
      with:
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
